<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Criar Conta - Plataforma EAD</title>

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background-color: #e9ecef;
			font-family: sans-serif;
		}

		.login-box {
			background: white;
			border-radius: 40px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
			width: 400px;
			padding: 50px 40px;
			text-align: center;
		}

		.form-control {
			border-radius: 50px;
			padding: 12px 25px;
			height: auto;
			border: 1px solid #ced4da;
			background-color: #f8f9fa;
		}

		.form-control:focus {
			box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
			border-color: #28a745;
		}

		.btn-success {
			background-color: #28a745;
			border: none;
			padding: 14px;
			font-weight: bold;
			border-radius: 50px;
			transition: all 0.3s ease;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-top: 10px;
		}

		.btn-success:hover {
			background-color: #218838;
			transform: translateY(-2px);
			box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
		}

		h2 {
			color: #333;
			font-weight: 800;
			margin-bottom: 25px;
		}

		.subtitle {
			color: #6c757d;
			margin-bottom: 25px;
			font-size: 0.9rem;
			margin-top: -15px;
		}
	</style>
</head>

<body>
	<div class="login-box">
		<div class="login-form-area" style="width: 100%;">
			<h2 class="mb-2">Criar Conta</h2>
			<p class="subtitle">Cadastre-se para acessar a plataforma</p>

			<form id="formCadastro" autocomplete="off">
				<input type="hidden" id="csrf" th:if="${_csrf}" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />

				<div class="form-group">
					<input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required>
				</div>
				<div class="form-group">
					<input type="email" id="email" class="form-control" placeholder="Seu melhor e-mail" required>
				</div>
				<div class="form-group">
					<input type="password" id="senha" class="form-control" placeholder="Crie uma senha" required
						autocomplete="new-password">
				</div>
				<div class="form-group">
					<input type="password" id="confirmarSenha" class="form-control" placeholder="Confirme a senha"
						required>
				</div>

				<button type="button" onclick="cadastrarUsuario()" class="btn btn-success btn-block">CADASTRAR
					AGORA</button>
			</form>

			<div class="text-center mt-3">
				<a th:href="@{/login}" class="text-muted small">Já tem conta? Voltar ao Login</a>
			</div>
		</div>
	</div>

	<script>
		async function cadastrarUsuario() {
			const nome = document.getElementById('nome').value;
			const email = document.getElementById('email').value;
			const senha = document.getElementById('senha').value;
			const confirmarSenha = document.getElementById('confirmarSenha').value;

			if (!nome || !email || !senha || !confirmarSenha) {
				Swal.fire({icon: 'warning', title: 'Atenção', text: 'Preencha todos os campos!'});
				return;
			}

			if (senha !== confirmarSenha) {
				Swal.fire({icon: 'error', title: 'Erro', text: 'As senhas não conferem!'});
				return;
			}

			const data = {nome, email, senha};
			const csrfElement = document.getElementById('csrf');
			const token = csrfElement ? csrfElement.value : '';

			try {
				const response = await fetch('/usuarios', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'X-CSRF-TOKEN': token
					},
					body: JSON.stringify(data)
				}

				);

				const text = await response.text();
				console.log('Status:', response.status);
				console.log('Resposta bruta:', text);

				if (response.ok) {
					Swal.fire({
						icon: 'success',
						title: 'Tudo certo!',
						text: 'Sua conta foi criada com sucesso.',
						showConfirmButton: false,
						timer: 2000
					}).then(() => {
						window.location.href = '/login';
					});
				} else {
					Swal.fire({
						icon: 'error',
						title: 'Ops...',
						text: 'Erro ao criar conta. Verifique os dados ou se o e-mail já existe.'
					});
				}
			} catch (error) {
				Swal.fire({icon: 'error', title: 'Erro', text: 'Falha na comunicação com o servidor.'});
			}
		}
	</script>
</body>

</html>

<!doctype html>
<html lang="pt" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Acesso à Plataforma</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
			background-color: #e9ecef;
			font-family: sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.login-box {
			background: white;
			border-radius: 40px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
			width: 900px;
			min-height: 500px;
			display: flex;
			overflow: hidden;
		}

		.login-form-area {
			width: 50%;
			padding: 50px;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		.form-control {
			border-radius: 50px;
			padding: 12px 25px;
			height: auto;
			border: 1px solid #ced4da;
			background-color: #f8f9fa;
		}

		.form-control:focus {
			box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
			border-color: #28a745;
		}

		.btn-success {
			background-color: #28a745;
			border: none;
			padding: 14px;
			font-weight: bold;
			border-radius: 50px;
			transition: all 0.3s ease;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-top: 10px;
		}

		.btn-success:hover {
			background-color: #218838;
			transform: translateY(-2px);
			box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
		}

		.alert-danger {
			border-radius: 50px;
			padding: 10px 20px;
		}

		h2 {
			color: #333;
			font-weight: 800;
			margin-bottom: 25px;
		}

		.auth-links a {
			transition: color 0.2s;
			text-decoration: none;
		}

		.auth-links a:hover {
			color: #218838 !important;
			text-decoration: underline;
		}

		@media (max-width: 800px) {
			.login-box {
				width: 90%;
				height: auto;
				border-radius: 30px;
			}

			.login-image-area {
				display: none !important;
			}

			.login-form-area {
				width: 100%;
				padding: 40px 30px;
			}
		}
	</style>

</head>

<body>
	<div class="login-box">
		<div class="d-none d-md-flex align-items-center justify-content-center"
			style="background-color: #f0fdf4; width: 50%;">
			<img src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png" style="width: 70%;" alt="Ilustração">
		</div>

		<div class="login-form-area">
			<h2 class="mb-4">Bem-vindo de volta!</h2>

			<div th:if="${param.error}" class="alert alert-danger p-2 text-center" style="font-size: 0.9rem;">
				E-mail ou senha não conferem.
			</div>

			<form th:action="@{/login}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<div class="form-group">
					<input type="email" name="username" class="form-control" placeholder="E-mail" required>
				</div>

				<div class="form-group">
					<input type="password" name="password" class="form-control" placeholder="Senha" required>
				</div>

				<button type="submit" class="btn btn-success btn-block">ENTRAR</button>

				<div class="auth-links text-center mt-4">
					<div class="mb-2">
						<a th:href="@{/recuperar-senha}" class="text-muted small">Esqueceu sua senha?</a>
					</div>
					<hr class="my-3" style="width: 50%; opacity: 0.5;">
					<div>
						<span class="small text-muted">Ainda não tem uma conta?</span><br>
						<a th:href="@{/sign-up}" class="text-success font-weight-bold">Criar nova conta</a>
					</div>
				</div>

				<p class="mt-5 mb-0 text-muted text-center" style="font-size: 0.8rem;">&copy; Plataforma EAD</p>
			</form>
		</div>
	</div>
</body>

</html>
<!-- 
Template baseado em exemplo do Bootstrap:
https://getbootstrap.com.br/docs/4.1/examples/sign-in/
 -->
